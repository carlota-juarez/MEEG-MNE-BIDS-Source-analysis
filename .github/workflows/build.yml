name: Build and push Docker image

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write   #imprescindible para poder publicar en ghcr.io

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # configura buildx para usar chaché
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/carlota-juarez/app-mne-bids:full
          # para reutilizar capas no modificadas entre ejecuciones
          cache-from: type=gha
          cache-to: type=gha,mode=max
        # me permite usar el digest de la imagen para referenciarlo desde el main (push automatico del main)
      - name: Update main.txt with new image digest
        run: |
          IMAGE_REF="ghcr.io/carlota-juarez/app-mne-bids@${{ steps.build.outputs.digest }}"
          sed -i -E "s|docker://ghcr\.io/carlota-juarez/app-mne-bids(@sha256:[a-f0-9]+|:full)|docker://${IMAGE_REF}|" main.txt
          grep -q "$IMAGE_REF" main.txt && echo "main.txt actualizado correctamente" || (echo "ERROR: main.txt no se actualizó" && exit 1)

      - name: Commit updated main.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add main.txt
          git diff --staged --quiet || git commit -m "chore: pin image digest to latest build [skip ci]"
          git push
